<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挑战完成 - 奶龙美术馆</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="museum-bg"></div>

    <!-- 全屏按钮 -->
    <div class="btn-with-label fullscreen-label-wrapper">
        <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="全屏模式">
            ⛶
        </button>
        <span class="btn-label">全屏</span>
    </div>

    <!-- 背景音乐控制 -->
    <div class="btn-with-label audio-label-wrapper">
        <button class="audio-control" id="audioControl" onclick="toggleAudio()" title="音乐开关">
            🎵
        </button>
        <span class="btn-label">音乐</span>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=relaxing-mountains-rivers-streams-running-water-18178.mp3" type="audio/mpeg">
    </audio>

    <main class="container">
        <div class="complete-container">
            <div class="pass-video">
                <video id="passVideo" autoplay playsinline muted>
                    <source src="assets/videos/pass.mp4" type="video/mp4">
                </video>
            </div>

            <h1 class="final-message" id="finalMessage" style="display: none;">
                可我觉得很神圣啊！
            </h1>

            <p class="final-quote" id="finalQuote" style="display: none;">
                —— 奶龙
            </p>

            <div class="result-summary" id="resultSummary" style="display: none;">
                <div class="result-rate">
                    <span class="result-rate-number" id="accuracyText">0%</span>
                    <span class="result-rate-label">正确率</span>
                </div>
                <div class="result-stat-list">
                    <div class="result-stat-item">
                        <span class="result-stat-value" id="finalScore">0</span>
                        <span class="result-stat-label">答对</span>
                    </div>
                    <div class="result-stat-item">
                        <span class="result-stat-value" id="finalTotal">0</span>
                        <span class="result-stat-label">总题数</span>
                    </div>
                    <div class="result-stat-item">
                        <span class="result-stat-value" id="wrongCount">0</span>
                        <span class="result-stat-label">答错</span>
                    </div>
                </div>
            </div>

            <button class="restart-btn" id="restartBtn" onclick="restartQuiz()" style="display: none;">
                再来一次
            </button>
        </div>
    </main>

    <script src="js/paintings-data.js"></script>
    <script>
        // 初始化
        function init() {
            const video = document.getElementById('passVideo');
            renderResultStats();

            // 视频播放结束后显示文字
            video.onended = function() {
                showFinalMessage();
            };

            // 如果视频加载失败，直接显示文字
            video.onerror = function() {
                showFinalMessage();
            };

            initAudio();
        }

        // 初始化音频
        function initAudio() {
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.volume = 0.15;

            const playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log('自动播放被阻止');
                });
            }
        }

        // 音乐开关
        function toggleAudio() {
            const bgMusic = document.getElementById('bgMusic');
            const audioControl = document.getElementById('audioControl');

            if (bgMusic.paused) {
                bgMusic.play();
                audioControl.textContent = '🎵';
                audioControl.classList.remove('muted');
            } else {
                bgMusic.pause();
                audioControl.textContent = '🔇';
                audioControl.classList.add('muted');
            }
        }

        // 全屏切换
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全屏模式被拒绝:', err);
                });
                localStorage.setItem('wasFullscreen', 'true');
            } else {
                document.exitFullscreen();
                localStorage.removeItem('wasFullscreen');
            }
        }

        // 显示最终文字
        function showFinalMessage() {
            document.getElementById('finalMessage').style.display = 'block';
            document.getElementById('finalQuote').style.display = 'block';
            document.getElementById('resultSummary').style.display = 'block';
            document.getElementById('restartBtn').style.display = 'inline-block';

            // 添加淡入动画
            setTimeout(() => {
                document.getElementById('finalMessage').style.opacity = '1';
                document.getElementById('resultSummary').style.opacity = '1';
            }, 100);
        }

        // 渲染本次挑战统计
        function renderResultStats() {
            var maxQuestionCount = typeof paintingsData !== 'undefined' && Array.isArray(paintingsData)
                ? paintingsData.length
                : 20;
            var savedQuizCount = parseInt(localStorage.getItem('quizCount') || maxQuestionCount.toString(), 10);
            var total = Number.isFinite(savedQuizCount) ? savedQuizCount : maxQuestionCount;
            total = Math.max(1, Math.min(total, maxQuestionCount));

            var savedScore = parseInt(localStorage.getItem('score') || '0', 10);
            var score = Number.isFinite(savedScore) ? savedScore : 0;
            score = Math.max(0, Math.min(score, total));

            var wrong = total - score;
            var accuracy = Math.round((score / total) * 100);

            document.getElementById('accuracyText').textContent = accuracy + '%';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalTotal').textContent = total;
            document.getElementById('wrongCount').textContent = wrong;
        }

        // 重新开始
        function restartQuiz() {
            localStorage.removeItem('currentQuestion');
            localStorage.removeItem('score');
            localStorage.removeItem('quizCount');
            localStorage.removeItem('answeredQuestions');
            localStorage.removeItem('lastAnswerCorrect');
            localStorage.removeItem('lastPainting');
            window.location.href = 'index.html';
        }

        // 页面加载时恢复全屏状态
        if (localStorage.getItem('wasFullscreen') === 'true') {
            document.addEventListener('click', function restoreFS() {
                document.documentElement.requestFullscreen().catch(() => {});
                localStorage.removeItem('wasFullscreen');
                document.removeEventListener('click', restoreFS);
            }, { once: true });
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
