<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题挑战 - 奶龙美术馆</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="museum-bg"></div>

    <!-- 全屏按钮 -->
    <div class="btn-with-label fullscreen-label-wrapper">
        <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="全屏模式">
            ⛶
        </button>
        <span class="btn-label">全屏</span>
    </div>

    <!-- 背景音乐控制 -->
    <div class="btn-with-label audio-label-wrapper">
        <button class="audio-control" id="audioControl" onclick="toggleAudio()" title="音乐开关">
            🎵
        </button>
        <span class="btn-label">音乐</span>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=relaxing-mountains-rivers-streams-running-water-18178.mp3" type="audio/mpeg">
    </audio>

    <!-- 答题卡按钮 -->
    <div class="btn-with-label answer-card-label-wrapper">
        <button class="answer-card-btn" onclick="showAnswerCard()" title="答题卡">
            📋
        </button>
        <span class="btn-label">答题卡</span>
    </div>

    <main class="container">
        <div class="quiz-container">
            <div class="progress-bar">
                <span class="progress-text" id="progressText">第 1 / 23 题</span>
                <span class="progress-score" id="progressScore">得分: 0</span>
            </div>

            <div class="painting-frame">
                <img src="" alt="奶龙改编名画" class="painting-img" id="paintingImg">
            </div>

            <h2 class="question-text">这幅画改编自哪幅世界名画？</h2>

            <div class="options-container" id="optionsContainer">
                <!-- 选项将通过JS动态生成 -->
            </div>

            <button class="submit-btn" id="submitBtn" onclick="submitAnswer()" disabled>
                确认答案
            </button>
        </div>

        <!-- 答题卡弹窗 -->
        <div id="answerCardModal" class="answer-card-modal">
            <div class="answer-card-content">
                <button class="answer-card-close" onclick="hideAnswerCard()">&times;</button>
                <h3>答题卡</h3>
                <div class="answer-card-grid" id="answerCardGrid"></div>
            </div>
        </div>
    </main>

    <script src="js/paintings-data.js"></script>
    <script>
        
// Fisher-Yates 洗牌算法
function shuffleArray(array) {
    var shuffled = array.slice();
    for (var i = shuffled.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = shuffled[i];
        shuffled[i] = shuffled[j];
        shuffled[j] = temp;
    }
    return shuffled;
}

// 获取随机化后的选项
function getRandomizedOptions(painting) {
    var options = painting.options.map(function(opt) {
        return { text: opt, isCorrect: opt === painting.title };
    });
    return shuffleArray(options);
}

let currentQuestion = 0;
        let selectedIsCorrect = false;
        let score = 0;
        let selectedOption = null;

        // 初始化
        function init() {
            const savedQuestion = localStorage.getItem('currentQuestion');
            const savedScore = localStorage.getItem('score');

            if (savedQuestion !== null) {
                currentQuestion = parseInt(savedQuestion);
                score = parseInt(savedScore || '0');
            }

            if (currentQuestion >= paintingsData.length) {
                window.location.href = 'complete.html';
                return;
            }

            loadQuestion();
            initAudio();
        }

        // 初始化音频
        function initAudio() {
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.volume = 0.15;

            // 尝试恢复播放
            const playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log('自动播放被阻止');
                });
            }
        }

        // 音乐开关
        function toggleAudio() {
            const bgMusic = document.getElementById('bgMusic');
            const audioControl = document.getElementById('audioControl');

            if (bgMusic.paused) {
                bgMusic.play();
                audioControl.textContent = '🎵';
                audioControl.classList.remove('muted');
            } else {
                bgMusic.pause();
                audioControl.textContent = '🔇';
                audioControl.classList.add('muted');
            }
        }

        // 全屏切换
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全屏模式被拒绝:', err);
                });
                localStorage.setItem('wasFullscreen', 'true');
            } else {
                document.exitFullscreen();
                localStorage.removeItem('wasFullscreen');
            }
        }

        // 加载题目
        function loadQuestion() {
            var quizCount = parseInt(localStorage.getItem('quizCount') || '23');
            var painting = paintingsData[currentQuestion];

            // 更新进度
            document.getElementById('progressText').textContent = '第 ' + (currentQuestion + 1) + ' / ' + quizCount + ' 题';
            document.getElementById('progressScore').textContent = '得分: ' + score;

            // 加载图片
            document.getElementById('paintingImg').src = 'assets/images/' + painting.image;

            // 生成随机化选项
            var optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            var randomizedOptions = getRandomizedOptions(painting);

            randomizedOptions.forEach(function(option, index) {
                var label = document.createElement('label');
                label.className = 'option-label';
                label.innerHTML = '<span class="option-marker">' + String.fromCharCode(65 + index) + '</span>' +
                    '<input type="radio" name="answer" value="' + option.text + '" data-correct="' + option.isCorrect + '" onchange="selectOption(this.value, this.dataset.correct)">' +
                    '<span class="option-text">' + option.text + '</span>';
                optionsContainer.appendChild(label);
            });

            // 重置选择
            selectedOption = null;
            selectedIsCorrect = false;
            document.getElementById('submitBtn').disabled = true;
        }

        // 选择选项
        function selectOption(option, isCorrect) {
            selectedOption = option;
            selectedIsCorrect = isCorrect === 'true';
            document.getElementById('submitBtn').disabled = false;
        }

        // 提交答案
        function submitAnswer() {
            if (!selectedOption) return;

            const painting = paintingsData[currentQuestion];
            var isCorrect = selectedIsCorrect;

            if (isCorrect) {
                score++;
            }

            // 保存进度
            localStorage.setItem('currentQuestion', (currentQuestion + 1).toString());
            localStorage.setItem('score', score.toString());
            localStorage.setItem('lastAnswerCorrect', isCorrect.toString());
            localStorage.setItem('lastPainting', JSON.stringify(painting));

            // 记录已答题目
            let answeredQuestions = JSON.parse(localStorage.getItem('answeredQuestions') || '[]');
            if (!answeredQuestions.includes(currentQuestion)) {
                answeredQuestions.push(currentQuestion);
                localStorage.setItem('answeredQuestions', JSON.stringify(answeredQuestions));
            }

            // 检查是否完成
            var quizCount = parseInt(localStorage.getItem('quizCount') || '23');
            if (currentQuestion + 1 >= quizCount) {
                window.location.href = 'complete.html';
            } else {
                window.location.href = 'feedback.html';
            }
        }

        // 显示答题卡
        function showAnswerCard() {
            const modal = document.getElementById('answerCardModal');
            const grid = document.getElementById('answerCardGrid');
            grid.innerHTML = '';
            for (let i = 0; i < paintingsData.length; i++) {
                const cell = document.createElement('div');
                cell.className = 'answer-card-cell';
                cell.textContent = i + 1;
                if (i === currentQuestion) cell.classList.add('current');
                const savedProgress = localStorage.getItem('answeredQuestions');
                if (savedProgress) {
                    const answered = JSON.parse(savedProgress);
                    if (answered.includes(i)) cell.classList.add('answered');
                }
                cell.onclick = function() { jumpToQuestion(i); };
                grid.appendChild(cell);
            }
            modal.style.display = 'flex';
        }

        function hideAnswerCard() {
            document.getElementById('answerCardModal').style.display = 'none';
        }

        function jumpToQuestion(questionIndex) {
            currentQuestion = questionIndex;
            localStorage.setItem('currentQuestion', questionIndex.toString());
            hideAnswerCard();
            loadQuestion();
        }

        // 页面加载时恢复全屏状态
        if (localStorage.getItem('wasFullscreen') === 'true') {
            document.addEventListener('click', function restoreFS() {
                document.documentElement.requestFullscreen().catch(() => {});
                localStorage.removeItem('wasFullscreen');
                document.removeEventListener('click', restoreFS);
            }, { once: true });
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
</body>
</html>
