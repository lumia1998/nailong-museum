<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 预加载关键资源 -->
    <link rel="preload" href="assets/images/starry-nailong-bg.jpg" as="image" type="image/jpeg">
    <link rel="preload" href="css/style.min.css" as="style">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奶龙美术馆 - nailong-museum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet"></noscript>
    <link rel="stylesheet" href="css/style.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <!-- DNS 预解析 -->
    <link rel="dns-prefetch" href="https://cdn.pixabay.com">
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    
    <!-- 移动端优化 -->
    <style>
        /* 移动端使用压缩背景 */
        @media (max-width: 768px) {
            .museum-bg {
                background-image: url('assets/images/starry-night-bg.jpg');
                opacity: 0.2;
            }
        }
        /* 减少动画性能消耗 */
        @media (max-width: 768px) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
    
</head>
<body class="home-page">
    <div class="museum-bg"></div>

    <!-- 全屏按钮 -->
    <div class="btn-with-label fullscreen-label-wrapper">
        <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="全屏模式">
            ⛶
        </button>
        <span class="btn-label">全屏</span>
    </div>

    <!-- 背景音乐控制 -->
    <div class="btn-with-label audio-label-wrapper">
        <button class="audio-control" id="audioControl" onclick="toggleAudio()" title="音乐开关">
            🎵
        </button>
        <span class="btn-label">音乐</span>
    </div>

    <!-- 投稿按钮 -->
    <div class="btn-with-label submit-label-wrapper">
        <button class="submit-corner-btn" onclick="openSubmissionPage()" title="投稿作品">
            📤
        </button>
        <span class="btn-label">投稿</span>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="none">
        <!-- 使用免费的舒缓音乐CDN -->
        <source src="https://cdn.pixabay.com/download/audio/2022/05/27/audio_1808fbf07a.mp3?filename=relaxing-mountains-rivers-streams-running-water-18178.mp3" type="audio/mpeg">
    </audio>

    <!-- 声明弹窗 -->
    <div id="disclaimer-modal" class="disclaimer-modal">
        <div class="disclaimer-content">
            <h2>📢 免责声明</h2>
            <div class="disclaimer-text">
                <p><strong>1.</strong> 本网站一切内容用于学习分享，侵权必删。</p>
                <p><strong>2.</strong> 本网页作者 GitHub 昵称为 <a href="https://github.com/lumia1998" target="_blank">lumia1998</a>，网址为 <a href="https://github.com/lumia1998/nailong-museum" target="_blank">github.com/lumia1998/nailong-museum</a>，网站代码已开源，有意者自取。</p>
            </div>
            <button id="disclaimer-agree" class="disclaimer-btn">我已了解，进入网站</button>
        </div>
    </div>

    <!-- 登录/用户信息区域 -->
    <div id="auth-container" class="auth-container">
        <div id="user-info" style="display:none">
            <span class="username-display"></span>
            <button onclick="authManager.logout()" class="auth-btn">退出</button>
        </div>
        <div id="login-prompt">
            <button onclick="authManager.showModal()" class="auth-btn">登录 / 注册</button>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="auth-modal" class="auth-modal">
        <div class="auth-modal-content">
            <button class="auth-close" onclick="authManager.hideModal()">&times;</button>
            <div id="auth-error" class="auth-error"></div>
            <div id="auth-success" class="auth-success"></div>
            <div id="login-form" class="auth-form">
                <h3>登录</h3>
                <input type="email" id="login-email" placeholder="邮箱" autocomplete="email">
                <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
                <button id="login-submit" class="auth-submit-btn">登录</button>
                <div class="divider"><span>或</span></div>
                <button class="wechat-btn" disabled>微信登录（即将开放）</button>
                <p class="auth-switch">还没有账号？<a href="#" id="switch-to-register">注册</a></p>
            </div>
            <div id="register-form" class="auth-form" style="display:none">
                <h3>注册</h3>
                <input type="text" id="register-username" placeholder="用户名" autocomplete="username">
                <input type="email" id="register-email" placeholder="邮箱" autocomplete="email">
                <input type="password" id="register-password" placeholder="密码（至少6位）" autocomplete="new-password">
                <input type="password" id="register-confirm-password" placeholder="确认密码" autocomplete="new-password">
                <button id="register-submit" class="auth-submit-btn">注册</button>
                <div class="divider"><span>或</span></div>
                <button class="wechat-btn" disabled>微信注册（即将开放）</button>
                <p class="auth-switch">已有账号？<a href="#" id="switch-to-login">登录</a></p>
            </div>
        </div>
    </div>


    <!-- 投稿弹窗 -->
    <div id="submission-modal" class="submission-modal">
        <div class="submission-modal-content">
            <button class="submission-close" onclick="closeSubmissionModal()">&times;</button>
            <h3>📤 投稿奶龙版名画</h3>
            <p class="submission-desc">分享你的奶龙艺术创作！</p>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <div id="uploadPlaceholder">
                    <span class="upload-icon">📷</span>
                    <p>点击上传奶龙改编名画</p>
                    <p class="upload-hint">支持 JPG, PNG，最大5MB</p>
                </div>
                <img id="previewImage" class="preview-image" style="display:none;">
                <button id="removeImage" class="remove-image" style="display:none;" onclick="event.stopPropagation(); clearImage();">×</button>
            </div>

            <div class="form-group">
                <label>对应原画名称 *</label>
                <input type="text" id="originalTitle" placeholder="例如：蒙娜丽莎">
            </div>

            <div class="form-group">
                <label>原画艺术家</label>
                <input type="text" id="originalArtist" placeholder="例如：达芬奇">
            </div>

            <div class="form-group">
                <label>你的署名（选填）</label>
                <input type="text" id="submitterName" placeholder="展示在投稿信息中">
            </div>

            <button id="submitArtworkBtn" class="submit-artwork-btn" disabled onclick="submitArtwork()">提交投稿</button>
            <div id="submitMessage" class="submit-message"></div>
        </div>
    </div>


<main class="container">
        <div class="hero-section">
            <div class="nailong-container">
                <img src="assets/images/thinking-nailong.jpg" alt="沉思的奶龙" class="nailong-img" loading="lazy" decoding="async" width="300" height="300" style="max-width:100%;height:auto;">
                <div class="glow-effect"></div>
            </div>

            <h1 class="museum-title">
                <span class="title-main">奶龙美术馆</span>
                <span class="title-sub">Nailong Art Museum</span>
            </h1>

            <p class="museum-desc">
                欢迎来到奶龙美术馆！<br>
                这里收藏了奶龙穿越世界名画的珍贵影像。<br>
                你能认出这些名画的原作吗？
            </p>

            <button class="start-btn" onclick="startQuiz()">
                <span class="btn-text">开始挑战</span>
                <span class="btn-shine"></span>
            </button>
        </div>
    </main>

    <script>
        // 自动播放背景音乐（音量较小）
        // 检测是否为移动设备
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        
        window.addEventListener('load', function() {
            // 移动端不自动播放音频
            if (isMobile) {
                console.log('移动设备 detected，跳过音频自动加载');
                return;
            }
            const bgMusic = document.getElementById('bgMusic');
            bgMusic.volume = 0.15; // 设置音量为15%

            // 尝试自动播放
            const playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // 自动播放被阻止，等待用户交互
                    console.log('自动播放被阻止，等待用户交互');
                });
            }
        });

        // 音乐开关
        function toggleAudio() {
            const bgMusic = document.getElementById('bgMusic');
            const audioControl = document.getElementById('audioControl');

            if (bgMusic.paused) {
                bgMusic.play();
                audioControl.textContent = '🎵';
                audioControl.classList.remove('muted');
            } else {
                bgMusic.pause();
                audioControl.textContent = '🔇';
                audioControl.classList.add('muted');
            }
        }

        // 全屏切换
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('全屏模式被拒绝:', err);
                });
                localStorage.setItem('wasFullscreen', 'true');
            } else {
                document.exitFullscreen();
                localStorage.removeItem('wasFullscreen');
            }
        }

        // 页面加载时恢复全屏状态
        if (localStorage.getItem('wasFullscreen') === 'true') {
            document.addEventListener('click', function restoreFS() {
                document.documentElement.requestFullscreen().catch(() => {});
                localStorage.removeItem('wasFullscreen');
                document.removeEventListener('click', restoreFS);
            }, { once: true });
        }

        
        // 声明弹窗逻辑 - 每次访问都弹出
        (function() {
            var modal = document.getElementById('disclaimer-modal');
            var agreeBtn = document.getElementById('disclaimer-agree');
            // 每次访问都显示声明弹窗
            agreeBtn.addEventListener('click', function() {
                modal.classList.add('hidden');
            });
        })();
        // 开始答题
        function startQuiz() {
            localStorage.setItem('currentQuestion', '0');
            localStorage.setItem('score', '0');
            window.location.href = 'select-quiz.html';
        }

        // 投稿功能
        var selectedFile = null;

        function openSubmissionPage() {
            var user = null;
            if (typeof authManager !== 'undefined') {
                user = authManager.currentUser;
            }
            if (!user) {
                if (typeof authManager !== 'undefined') {
                    authManager.showModal();
                }
                return;
            }
            document.getElementById('submission-modal').style.display = 'flex';
        }

        function closeSubmissionModal() {
            document.getElementById('submission-modal').style.display = 'none';
        }

        document.getElementById('imageInput').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showSubmitMsg('请上传图片文件', 'error');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showSubmitMsg('图片大小不能超过5MB', 'error');
                return;
            }
            selectedFile = file;
            var reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById('previewImage').src = ev.target.result;
                document.getElementById('previewImage').style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
                document.getElementById('removeImage').style.display = 'block';
                validateSubmitForm();
            };
            reader.readAsDataURL(file);
        });

        function clearImage() {
            selectedFile = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('previewImage').style.display = 'none';
            document.getElementById('uploadPlaceholder').style.display = 'block';
            document.getElementById('removeImage').style.display = 'none';
            validateSubmitForm();
        }

        function validateSubmitForm() {
            var hasImage = !!selectedFile;
            var hasTitle = document.getElementById('originalTitle').value.trim() !== '';
            document.getElementById('submitArtworkBtn').disabled = !(hasImage && hasTitle);
        }

        document.getElementById('originalTitle').addEventListener('input', validateSubmitForm);

        function submitArtwork() {
            var btn = document.getElementById('submitArtworkBtn');
            btn.disabled = true;
            btn.textContent = '上传中...';

            var user = authManager.currentUser;
            if (!user) {
                showSubmitMsg('请先登录', 'error');
                btn.disabled = false;
                btn.textContent = '提交投稿';
                return;
            }

            var title = document.getElementById('originalTitle').value.trim();
            var artist = document.getElementById('originalArtist').value.trim();

            if (!selectedFile) {
                showSubmitMsg('请选择图片', 'error');
                btn.disabled = false;
                btn.textContent = '提交投稿';
                return;
            }
            if (!title) {
                showSubmitMsg('请填写原画名称', 'error');
                btn.disabled = false;
                btn.textContent = '提交投稿';
                return;
            }

            var fileExt = selectedFile.name.split('.').pop();
            var fileName = Date.now() + '_' + Math.random().toString(36).substr(2, 9) + '.' + fileExt;
            var filePath = 'nailong/' + fileName;

            // 设置超时
            var timeoutId = setTimeout(function() {
                showSubmitMsg('上传超时，请重试', 'error');
                btn.disabled = false;
                btn.textContent = '提交投稿';
            }, 30000);

            // 上传图片
            supabaseClient.storage.from('paintings').upload(filePath, selectedFile).then(function(uploadResult) {
                if (uploadResult.error) {
                    clearTimeout(timeoutId);
                    console.error('Storage upload error:', uploadResult.error);
                    showSubmitMsg('图片上传失败: ' + (uploadResult.error.message || '请检查Storage配置'), 'error');
                    btn.disabled = false;
                    btn.textContent = '提交投稿';
                    return;
                }

                // 获取公开URL
                var urlResult = supabaseClient.storage.from('paintings').getPublicUrl(filePath);
                if (!urlResult.data || !urlResult.data.publicUrl) {
                    clearTimeout(timeoutId);
                    showSubmitMsg('获取图片URL失败', 'error');
                    btn.disabled = false;
                    btn.textContent = '提交投稿';
                    return;
                }

                var publicUrl = urlResult.data.publicUrl;

                // 保存到数据库
                return supabaseClient.from('submissions').insert({
                    user_id: user.id,
                    image_url: publicUrl,
                    original_title: title,
                    original_artist: artist || null,
                    status: 'pending'
                });
            }).then(function(dbResult) {
                clearTimeout(timeoutId);
                if (dbResult && dbResult.error) {
                    console.error('DB insert error:', dbResult.error);
                    showSubmitMsg('保存投稿记录失败: ' + (dbResult.error.message || '请检查数据库配置'), 'error');
                    btn.disabled = false;
                    btn.textContent = '提交投稿';
                    return;
                }

                showSubmitMsg('投稿成功！等待审核中...', 'success');
                selectedFile = null;
                document.getElementById('originalTitle').value = '';
                document.getElementById('originalArtist').value = '';
                document.getElementById('submitterName').value = '';
                clearImage();

                setTimeout(closeSubmissionModal, 2000);
            }).catch(function(error) {
                clearTimeout(timeoutId);
                console.error('投稿失败:', error);
                showSubmitMsg('投稿失败: ' + (error.message || '请重试'), 'error');
                btn.disabled = false;
                btn.textContent = '提交投稿';
            });
        }

        function showSubmitMsg(text, type) {
            var el = document.getElementById('submitMessage');
            el.textContent = text;
            el.className = 'submit-message ' + type;
            setTimeout(function() {
                el.textContent = '';
                el.className = 'submit-message';
            }, 5000);
        }
    </script>
</body>
</html>
